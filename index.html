<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Texto</title>

<style>

body{
background:#0f0f0f;
color:#00ff9c;
font-family:monospace;
text-align:center;
margin-top:40px;
}

input,button,textarea{
background:#111;
border:1px solid #00ff9c;
color:#00ff9c;
padding:10px;
margin:5px;
}

textarea{
width:80%;
height:200px;
resize:none;
}

button:hover{
background:#00ff9c;
color:black;
cursor:pointer;
}

#painel{display:none}

.aba{
display:none;
margin-top:30px;
}

ul{
list-style:none;
padding:0;
}

li{
padding:8px;
border-bottom:1px solid #333;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
flex-wrap:wrap;
}

</style>

</head>
<body>

<div id="login">

<h2>ACESSO</h2>

<input type="password" id="senha" placeholder="senha">
<br><br>
<button onclick="entrar()">ENTRAR</button>

<p id="erro"></p>

</div>


<div id="painel">

<h2>PAINEL DE TEXTOS</h2>

<button onclick="abrir('editor')">NOVO / EDITAR</button>
<button onclick="abrir('lista')">TEXTOS</button>

<div id="editor" class="aba">

<h3>Editor</h3>

<input type="text" id="titulo" placeholder="Título"><br>

<textarea id="conteudo" placeholder="Digite seu texto..."></textarea><br>

<button onclick="salvar()">SALVAR</button>

<p id="status"></p>

</div>


<div id="lista" class="aba">

<h3>Textos Salvos</h3>

<button onclick="listar()">ATUALIZAR</button>

<ul id="listaTextos"></ul>

</div>

</div>

<script>

const SENHA="roteirosdd"

const URL_SCRIPT="https://script.google.com/macros/s/AKfycby0mu3MGFqcg7vT-0E2S6v8zVgyS6BYultmtmkhDhZcIVPkHcTSSGHHETmULQp9q1Wn/exec"

let editandoID=null


function entrar(){

const s=document.getElementById("senha").value

if(s===SENHA){
document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"
abrir("editor")
}else{
document.getElementById("erro").innerText="senha incorreta"
}

}


function abrir(nome){

document.querySelectorAll(".aba").forEach(a=>a.style.display="none")
document.getElementById(nome).style.display="block"

}


function salvar(){

const titulo=document.getElementById("titulo").value
const conteudo=document.getElementById("conteudo").value

fetch(URL_SCRIPT,{
method:"POST",
body:new URLSearchParams({
senha:SENHA,
titulo:titulo,
conteudo:conteudo,
id:editandoID
})
})
.then(r=>r.text())
.then(t=>{
document.getElementById("status").innerText=t

// limpa editor
editandoID=null
document.getElementById("titulo").value=""
document.getElementById("conteudo").value=""
})

}


function listar(){

fetch(URL_SCRIPT+"?listar=1")
.then(r=>r.json())
.then(lista=>{

const ul=document.getElementById("listaTextos")
ul.innerHTML=""

lista.forEach(txt=>{

const li=document.createElement("li")

const titulo=document.createElement("b")
titulo.textContent=txt.titulo

const editar=document.createElement("button")
editar.textContent="✏️"

editar.onclick=function(){
abrir("editor")
document.getElementById("titulo").value=txt.titulo
document.getElementById("conteudo").value=txt.conteudo
editandoID=txt.id
}

const del=document.createElement("button")
del.textContent="🗑"

del.onclick=function(){

fetch(URL_SCRIPT,{
method:"POST",
body:new URLSearchParams({
senha:SENHA,
deletar:txt.id
})
})
.then(()=>listar())

}

li.appendChild(titulo)
li.appendChild(editar)
li.appendChild(del)

ul.appendChild(li)

})

})

}

</script>

</body>
</html>
