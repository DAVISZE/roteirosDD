<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloco de Notas</title>

<style>
body{
background:#0f0f0f;
color:#00ff9c;
font-family:monospace;
text-align:center;
margin-top:40px;
}

input,button,textarea{
background:#111;
border:1px solid #00ff9c;
color:#00ff9c;
padding:10px;
margin:5px;
}

textarea{
width:80%;
height:250px;
}

button:hover{
background:#00ff9c;
color:black;
cursor:pointer;
}

#painel{display:none}
.aba{display:none;margin-top:30px;}

ul{list-style:none;padding:0;}

li{
padding:8px;
border-bottom:1px solid #333;
display:flex;
justify-content:center;
gap:10px;
}
</style>
</head>
<body>

<div id="login">
<h2>ACESSO</h2>
<input type="password" id="senha">
<br><br>
<button onclick="entrar()">ENTRAR</button>
<p id="erro"></p>
</div>

<div id="painel">

<h2>BLOCO DE NOTAS</h2>

<button onclick="abrir('editor')">ESCREVER</button>
<button onclick="abrir('lista')">VER TEXTOS</button>

<div id="editor" class="aba">

<input type="text" id="nome" placeholder="nome do arquivo"><br>

<textarea id="texto" placeholder="Digite seu texto..."></textarea><br>

<button onclick="salvar()">SALVAR</button>

<p id="status"></p>

</div>

<div id="lista" class="aba">

<button onclick="listar()">ATUALIZAR</button>

<ul id="listaTxt"></ul>

</div>

</div>

<script>

const SENHA="roteirosdd"
const URL="https://script.google.com/macros/s/AKfycby0mu3MGFqcg7vT-0E2S6v8zVgyS6BYultmtmkhDhZcIVPkHcTSSGHHETmULQp9q1Wn/exec"

function entrar(){
const s=document.getElementById("senha").value

if(s===SENHA){
login.style.display="none"
painel.style.display="block"
abrir("editor")
}else{
erro.innerText="senha incorreta"
}
}

function abrir(nome){
document.querySelectorAll(".aba").forEach(a=>a.style.display="none")
document.getElementById(nome).style.display="block"
}

function salvar(){

const nome=document.getElementById("nome").value + ".txt"
const texto=document.getElementById("texto").value

const base64=btoa(unescape(encodeURIComponent(texto)))

fetch(URL,{
method:"POST",
body:new URLSearchParams({
senha:SENHA,
nome:nome,
tipo:"text/plain",
file:base64
})
})
.then(r=>r.text())
.then(t=>{
status.innerText=t
})

}

function listar(){

fetch(URL+"?listar=1")
.then(r=>r.json())
.then(lista=>{

const ul=document.getElementById("listaTxt")
ul.innerHTML=""

lista.forEach(arq=>{

const li=document.createElement("li")

const nome=document.createElement("span")
nome.textContent=arq.nome

const abrir=document.createElement("button")
abrir.textContent="👁"

abrir.onclick=function(){
fetch(arq.url)
.then(r=>r.text())
.then(txt=>{
document.getElementById("texto").value=txt
document.getElementById("nome").value=arq.nome.replace(".txt","")
abrirAbaEditor()
})
}

const editar=document.createElement("button")
editar.textContent="✏️"

editar.onclick=function(){

fetch(URL,{
method:"POST",
body:new URLSearchParams({
senha:SENHA,
deletar:arq.id
})
})
.then(()=>{
fetch(arq.url)
.then(r=>r.text())
.then(txt=>{
document.getElementById("texto").value=txt
document.getElementById("nome").value=arq.nome.replace(".txt","")
abrir("editor")
})
})

}

li.appendChild(nome)
li.appendChild(abrir)
li.appendChild(editar)

ul.appendChild(li)

})

})

}

</script>

</body>
</html>
